<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercise 63 - Cart</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/public/css/style.css">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Session Shopping Cart</a>
        <div class="ms-auto">
          <span class="badge text-bg-dark">Items: {{CART_COUNT}}</span>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3 mb-1">Your Cart</h1>
        <p class="text-muted">Update quantities or remove items, then click “Update shopping cart”.</p>
      </header>

      <form method="post" action="/update-cart">
        <div class="table-responsive bg-white border rounded shadow-sm">
          <table class="table align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Product</th>
                <th class="text-end">Price</th>
                <th>Quantity</th>
                <th class="text-end">Subtotal</th>
                <th class="text-end">Action</th>
              </tr>
            </thead>
            <tbody>
              {{CART_ROWS}}
            </tbody>
          </table>
        </div>

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mt-3 gap-2">
          <div class="fs-5">
            Total: <span class="fw-semibold">{{CART_TOTAL}}</span>
          </div>
          <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">Continue shopping</a>
            <button type="submit" class="btn btn-primary">Update shopping cart</button>
            <button type="submit" formaction="/checkout" formmethod="post" class="btn btn-success">
              Checkout (simulate)
            </button>
          </div>
        </div>
      </form>
    </main>
  </body>
</html>
