<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercise 63 - Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="/public/css/style.css">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
      <div class="container">
        <span class="navbar-brand fw-semibold">Session Shopping Cart</span>
        <div class="ms-auto">
          <a href="/cart" class="btn btn-outline-dark">
            Cart <span class="badge text-bg-dark ms-1">{{CART_COUNT}}</span>
          </a>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      <header class="mb-4">
        <h1 class="h3 mb-1">Product List</h1>
        <p class="text-muted">Click “ADD TO CART” to store products in your session.</p>
      </header>

      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        {{PRODUCT_CARDS}}
      </div>
    </main>
  </body>
</html>
