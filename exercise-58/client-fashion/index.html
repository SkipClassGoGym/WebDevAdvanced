<!DOCTYPE html>
<html lang="en" ng-app="clientFashion">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Client</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-text">
          <p class="eyebrow">FashionData Client</p>
          <h1>Discover Looks by Style</h1>
          <p class="subtitle">
            Browse curated fashion pieces grouped by style. Click any item to see the full
            details.
          </p>
        </div>
        <div class="hero-card">
          <div class="hero-tag">Live</div>
          <h3>Style Atlas</h3>
          <p>Find Streetwear, Minimalist, and Vintage in one clean view.</p>
        </div>
      </div>
    </header>

    <main class="page">
      <div ng-view></div>
    </main>

    <script type="text/ng-template" id="home.html">
      <section class="toolbar card">
        <div>
          <h2>Browse by Style</h2>
          <p>Search or choose a style to filter the catalog.</p>
        </div>
        <div class="filters">
          <input
            type="text"
            placeholder="Type a style..."
            ng-model="styleQuery"
            ng-disabled="loading"
          />
          <select ng-model="styleSelect" ng-disabled="loading">
            <option value="">All Styles</option>
            <option ng-repeat="style in styles" value="{{ style }}">{{ style }}</option>
          </select>
          <button class="btn ghost" type="button" ng-click="clearFilter()">Clear</button>
        </div>
      </section>

      <section class="card" ng-if="loading">
        <div class="state">Loading fashions...</div>
      </section>
      <section class="card" ng-if="error">
        <div class="state error">{{ error }}</div>
      </section>

      <section class="group" ng-repeat="style in groupOrder" ng-if="!loading && groupOrder.length">
        <div class="group-header">
          <h3>{{ style }}</h3>
          <span class="count">{{ grouped[style].length }} items</span>
        </div>
        <div class="grid">
          <a class="fashion-card" href="#!/fashion/{{ item._id }}" ng-repeat="item in grouped[style]">
            <div class="thumb">
              <img ng-src="{{ item.thumbnail }}" alt="{{ item.title }}" />
            </div>
            <div class="info">
              <h4>{{ item.title }}</h4>
              <p class="meta">Created {{ item.createdAt | date:'mediumDate' }}</p>
            </div>
          </a>
        </div>
      </section>

      <section class="card" ng-if="!loading && !groupOrder.length && !error">
        <div class="state">No fashions match this style.</div>
      </section>
    </script>

    <script type="text/ng-template" id="detail.html">
      <section class="card" ng-if="!loading">
        <a href="#!/" class="back">← Back to styles</a>
        <div class="detail" ng-if="fashion">
          <img class="detail-img" ng-src="{{ fashion.thumbnail }}" alt="{{ fashion.title }}" />
          <div class="detail-content">
            <h2>{{ fashion.title }}</h2>
            <p class="detail-style">Style: {{ fashion.style }}</p>
            <p class="detail-date">Created: {{ fashion.createdAt | date:'medium' }}</p>
            <div class="detail-body" ng-bind-html="fashion.details"></div>
          </div>
        </div>
        <div class="state error" ng-if="error">{{ error }}</div>
      </section>
      <section class="card" ng-if="loading">
        <div class="state">Loading fashion...</div>
      </section>
    </script>

    <script src="https://cdn.jsdelivr.net/npm/angular@1.8.3/angular.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/angular-route@1.8.3/angular-route.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/angular-sanitize@1.8.3/angular-sanitize.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
